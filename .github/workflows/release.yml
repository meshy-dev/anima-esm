name: release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Silence [DEP0040] `punycode` built-in deprecation warnings emitted by the
# deploy-pages action (and esbuild) on Node 22/24 runners — upstream noise, not
# actionable from this repo. --disable-warning=CODE is targeted (Node 21.2+).
env:
  NODE_OPTIONS: "--disable-warning=DEP0040"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v6.0.0
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry_1.outputs.page_url || steps.deployment_retry_2.outputs.page_url }}
    steps:
      # deploy-pages intermittently fails with "Deployment failed, try again
      # later" — a transient GitHub Pages API hiccup (unrelated to this repo's
      # content). Retry up to 3 attempts; the job fails only if all 3 fail.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        id: deployment_retry_1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure'
        id: deployment_retry_2
        uses: actions/deploy-pages@v4

  publish-npm:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - if: env.HAS_TOKEN == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: env.HAS_TOKEN != 'true'
        run: echo 'NPM_TOKEN not set; skipping npm publish (the library is delivered via the GitHub Pages importmap).'
