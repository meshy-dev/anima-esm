name: release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Silence [DEP0040] `punycode` built-in deprecation warnings emitted by the
# deploy-pages action (and esbuild) on Node 22/24 runners — upstream noise, not
# actionable from this repo. --disable-warning=CODE is targeted (Node 21.2+).
env:
  NODE_OPTIONS: "--disable-warning=DEP0040"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v6.0.0
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry_1.outputs.page_url || steps.deployment_retry_2.outputs.page_url }}
    steps:
      # deploy-pages intermittently fails with "Deployment failed, try again
      # later" straight from the Pages backend even when the uploaded artifact
      # is valid (actions/deploy-pages#406, recurring since 2026-01). The failure
      # is transient — the same commit deploys cleanly on a manual re-run — so a
      # single attempt turns a GitHub-side hiccup into a red deploy. Retry the
      # deploy step up to 3 times (with a short back-off); the first two attempts
      # use continue-on-error so a later success does not mark the job failed,
      # and only the final attempt is allowed to fail the job. Each retry re-
      # invokes the action against the already-uploaded artifact (equivalent to
      # hitting "Re-run" by hand), never re-uploading (which would create a
      # duplicate github-pages artifact). The environment url falls through to
      # whichever attempt produced a page_url. Note: tuning the action's own
      # timeout / error_count would not help — this is an immediate error
      # status, not a polling timeout, so the whole action call must be retried.
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
        continue-on-error: true
      - name: Back off before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: deployment_retry_1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5.0.0
        continue-on-error: true
      - name: Back off before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure'
        run: sleep 60
      - id: deployment_retry_2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_1.outcome == 'failure'
        uses: actions/deploy-pages@v5.0.0

  publish-npm:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - if: env.HAS_TOKEN == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: env.HAS_TOKEN != 'true'
        run: echo 'NPM_TOKEN not set; skipping npm publish (the library is delivered via the GitHub Pages importmap).'
